name: Data Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 3:00 AM UTC
  workflow_dispatch:

jobs:
  quality:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup old branch caches
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Cleaning up old caches for this branch..."
          gh cache list --ref ${{ github.ref }} --json id,key,createdAt \
            | jq -r '.[] | select(.createdAt < (now - 7*24*60*60 | strftime("%Y-%m-%dT%H:%M:%SZ"))) | .id' \
            | xargs -r -I {} gh cache delete {}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Data Quality Tools
        uses: actions/cache@v4
        with:
          path: |
            soda_results.json
            .soda
            great_expectations/uncommitted
            ~/.great_expectations
          key: ${{ runner.os }}-python3.12-dq-${{ hashFiles(
            'data_quality/checks/**/*.yml',
            'data_quality/soda_manager.py',
            'data_quality/cli/run_soda_checks.py',
            'great_expectations/expectations/**/*.json',
            'requirements*.txt',
            'pyproject.toml'
            ) }}
          restore-keys: |
            ${{ runner.os }}-python3.12-dq-
            ${{ runner.os }}-dq-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ci.txt
          pip install great_expectations

      - name: Run Full Data Quality Suite (Soda + Great Expectations)
        run: make quality
        env:
          SODA_CLOUD_API_KEY_ID: ${{ secrets.SODA_CLOUD_API_KEY_ID }}
          SODA_CLOUD_API_KEY_SECRET: ${{ secrets.SODA_CLOUD_API_KEY_SECRET }}

  # ============================================================
  # Scheduled Cache Cleanup (runs weekly)
  # ============================================================
  cleanup-caches:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup old caches
        run: |
          echo "Cleaning up old Data Quality caches..."

          # Delete caches older than 30 days for this repository
          gh cache list --limit 100 --json id,createdAt,key,ref \
            | jq -r '.[] | select(.createdAt < (now - 30*24*60*60 | strftime("%Y-%m-%dT%H:%M:%SZ"))) | .id' \
            | xargs -r -I {} gh cache delete {}

          echo "Cache cleanup completed."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}