name: Data Quality

on:
  push:
    branches: [main]
    paths:
      - "data_quality/**"
      - "Makefile"
      - "requirements.txt"
      - "requirements-ci.txt"
      - ".github/workflows/data-quality.yml"
  pull_request:
    branches: [main]
    paths:
      - "data_quality/**"
      - "Makefile"
      - "requirements.txt"
      - "requirements-ci.txt"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache Soda Core
        uses: actions/cache@v4
        with:
          path: |
            soda_results.json
            .soda
          key: ${{ runner.os }}-python${{ matrix.python-version }}-soda-${{ hashFiles(
            'data_quality/checks/**/*.yml',
            'data_quality/soda_manager.py',
            'data_quality/cli/run_soda_checks.py',
            'requirements*.txt',
            'pyproject.toml'
            ) }}
          restore-keys: |
            ${{ runner.os }}-python${{ matrix.python-version }}-soda-
            ${{ runner.os }}-soda-

      - name: Cache Great Expectations
        uses: actions/cache@v4
        with:
          path: |
            great_expectations/uncommitted
            ~/.great_expectations
            gx_results.json
          key: ${{ runner.os }}-python${{ matrix.python-version }}-gx-${{ hashFiles(
            'data_quality/gx_suites/**/*.json',
            'data_quality/gx_manager.py',
            'data_quality/cli/run_gx_checks.py'
            ) }}
          restore-keys: |
            ${{ runner.os }}-python${{ matrix.python-version }}-gx-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ci.txt
          pip install great_expectations

      - name: Run Full Data Quality Suite (Soda + Great Expectations)
        run: make quality
        env:
          SODA_CLOUD_API_KEY_ID: ${{ secrets.SODA_CLOUD_API_KEY_ID }}
          SODA_CLOUD_API_KEY_SECRET: ${{ secrets.SODA_CLOUD_API_KEY_SECRET }}