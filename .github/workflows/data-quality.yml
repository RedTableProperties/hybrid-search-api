name: Data Quality Automation (Soda + Great Expectations)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  data-quality:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      # Cache for both Soda and Great Expectations
      - name: Cache Data Quality Tools
        uses: actions/cache@v6
        with:
          path: |
            soda_results.json
            .soda
            great_expectations/uncommitted
            ~/.great_expectations
          key: ${{ runner.os }}-py3.14-dq-v2-${{ hashFiles('data_quality/checks/**/*.yml', 'data_quality/soda_manager.py', 'data_quality/gx_manager.py', 'data_quality/cli/*.py', 'great_expectations/expectations/**/*.json', 'Makefile', 'requirements*.txt', 'pyproject.toml', '.github/workflows/data-quality.yml') }}
          restore-keys: |
            ${{ runner.os }}-py3.14-dq-v2-
            ${{ runner.os }}-dq-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install soda-core pandas great_expectations

      # ============================================================
      # Run Soda Core Checks (Primary)
      # ============================================================
      - name: Run Soda Core Data Quality Checks
        run: make quality-soda
        env:
          SODA_CLOUD_API_KEY_ID: ${{ secrets.SODA_CLOUD_API_KEY_ID }}
          SODA_CLOUD_API_KEY_SECRET: ${{ secrets.SODA_CLOUD_API_KEY_SECRET }}

      # ============================================================
      # Run Great Expectations Checks (Selective)
      # ============================================================
      - name: Run Great Expectations Checks
        run: make quality-gx || true

      # ============================================================
      # Generate Great Expectations Data Docs
      # ============================================================
      - name: Build Great Expectations Data Docs
        if: always()
        run: |
          great_expectations docs build --site-name local_site \
            || python data_quality/cli/build_gx_data_docs.py

      # ============================================================
      # Deploy Data Docs to GitHub Pages
      # ============================================================
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Data Docs Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: great_expectations/uncommitted/data_docs/local_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # ============================================================
      # Upload All Reports as Artifacts
      # ============================================================
      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: data-quality-reports
          path: |
            soda_results.json
            great_expectations/uncommitted/validations
          retention-days: 30
          if-no-files-found: warn