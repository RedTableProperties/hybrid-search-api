name: Data Quality Automation (Soda + Great Expectations)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  data-quality:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pages: write
      id-token: write
    environment: ${{ github.ref == 'refs/heads/main' && 'github-pages' || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cleanup old branch caches
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Cleaning up old caches for this branch..."
          gh cache list --ref ${{ github.ref }} --json id,key,createdAt \
            | jq -r '.[] | select(.createdAt < (now - 7*24*60*60 | strftime("%Y-%m-%dT%H:%M:%SZ"))) | .id' \
            | xargs -r -I {} gh cache delete {}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      # ============================================================
      # Optimized Combined Cache for Soda Core + Great Expectations
      # Key includes: check files, tool code, Makefile, workflow, dependencies
      # ============================================================
      - name: Cache Data Quality Tools
        uses: actions/cache@v4
        with:
          path: |
            soda_results.json
            .soda
            great_expectations/uncommitted
            ~/.great_expectations
          key: ${{ runner.os }}-py3.14-dq-v2-${{ hashFiles('data_quality/checks/**/*.yml', 'data_quality/soda_manager.py', 'data_quality/gx_manager.py', 'data_quality/cli/*.py', 'great_expectations/expectations/**/*.json', 'Makefile', 'requirements*.txt', 'pyproject.toml', '.github/workflows/data-quality.yml') }}
          restore-keys: |
            ${{ runner.os }}-py3.14-dq-v2-
            ${{ runner.os }}-py3.14-dq-
            ${{ runner.os }}-dq-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ci.txt
          pip install great_expectations

      # ============================================================
      # Run Soda Core Checks (Primary)
      # ============================================================
      - name: Run Soda Core Data Quality Checks
        run: make quality-soda
        env:
          SODA_CLOUD_API_KEY_ID: ${{ secrets.SODA_CLOUD_API_KEY_ID }}
          SODA_CLOUD_API_KEY_SECRET: ${{ secrets.SODA_CLOUD_API_KEY_SECRET }}

      # ============================================================
      # Run Great Expectations Checks (Selective)
      # ============================================================
      - name: Run Great Expectations Checks
        run: make quality-gx || true

      # ============================================================
      # Generate Great Expectations Data Docs
      # ============================================================
      - name: Build Great Expectations Data Docs
        if: always()
        run: make quality-report

      # ============================================================
      # Deploy Data Docs to GitHub Pages
      # ============================================================
      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload Data Docs Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: great_expectations/uncommitted/data_docs/local_site

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v5

      # ============================================================
      # Upload All Reports as Artifacts
      # ============================================================
      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: data-quality-reports
          path: |
            soda_results.json
            gx_results.json
            great_expectations/uncommitted/data_docs/local_site
          retention-days: 30

  cleanup-caches:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cleanup old Data Quality caches
        run: |
          gh cache list --limit 200 --json id,createdAt,key \
            | jq -r '.[] | select((.createdAt | fromdateiso8601) < (now - 30*24*60*60)) | .id' \
            | xargs -r -I {} gh cache delete {}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}