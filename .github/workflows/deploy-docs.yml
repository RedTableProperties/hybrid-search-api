name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "openapi.yaml"
      - "redocly.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  security:
    uses: ./.github/workflows/security-scan.yml

  deploy:
    needs: security
    uses: ./.github/workflows/reusable-deploy-docs.yml