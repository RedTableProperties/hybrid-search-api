name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "openapi.yaml"
      - "redocly.yaml"
      - "docs/template.html"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-docs.yml"
      - ".github/workflows/reusable-deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy-docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write